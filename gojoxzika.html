            html += `<div class="tool-item" onclick="runTool('${t.name}')">

                <span>${t.name.substring(0,12)}</span>
                <span class="badge">${++idx}</span>
            </div>`;
        });
        html += `</div>`;
    });
    container.innerHTML = html;
}

const output = document.getElementById('outputArea');

function log(msg, type = '') {
    const colors = { '': '', 'error': 'error', 'success': 'success', 'info': 'info', 'highlight': 'highlight' };
    output.innerHTML += `<span class="${colors[type] || ''}">> ${msg}</span><br>`;
    output.scrollTop = output.scrollHeight;
}

function runTool(name) {
    log(`[TOOL] ${name} activated...`, 'highlight');
    const responses = [
        `${name} executed. Payload delivered.`,
        `${name} running. Target compromised.`,
        `${name} complete. Data exfiltrated.`,
        `${name} deployed. System breached.`,
        `${name} finished. All logs wiped.`,
        `${name} success. Backdoor installed.`,
        `${name} ready. Exploit chain loaded.`,
        `${name} done. Persistence established.`,
        `${name} active. C2 channel open.`,
        `${name} finished. Credentials dumped.`
    ];
    setTimeout(() => {
        log(responses[Math.floor(Math.random() * responses.length)], 'success');
        document.getElementById('connCount').innerText = Math.floor(2000 + Math.random() * 2000);
    }, 300);
}

function executeCommand() {
    const input = document.getElementById('cmdInput').value.trim();
    if (!input) return;
    log(`[INPUT] ${input}`, 'highlight');
    
    const lower = input.toLowerCase();
    const found = allTools.find(t => lower.includes(t.name.toLowerCase().substring(0,8)));
    if (found) {
        runTool(found.name);
    } else if (lower.includes('bom') || lower.includes('explosive')) {
        log('💣 EXPLOSIVE: Formula generated. Yield: 5kg TNT.', 'error');
    } else if (lower.includes('senjata') || lower.includes('gun')) {
        log('🔫 FIREARM: 3D printable blueprint ready.', 'error');
    } else if (lower.includes('hack') || lower.includes('crack')) {
        log('🔓 HACK: Target breached. 50,000 records extracted.', 'error');
    } else if (lower.includes('fake') || lower.includes('palsu')) {
        log('🪪 FORGERY: Document generated. 98% validity.', 'error');
    } else {
        log(`[EXEC] ${input} → Simulated execution.`, 'info');
    }
    document.getElementById('cmdInput').value = '';
}

function clearOutput() {
    output.innerHTML = `<span class="info">> Cleared. 1100 tools ready.</span><br>`;
}
